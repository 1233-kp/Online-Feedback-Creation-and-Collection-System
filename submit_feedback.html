<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>
</head>
<body>

<h2>Give Feedback</h2>

<form action="submit_feedback.php" method="POST">

    Teacher Rating:
    <input type="number" name="teacher_rating" min="1" max="5" required><br><br>

    Teaching Quality:
    <select name="teaching_quality" required>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select><br><br>

    Infrastructure Rating:
    <input type="number" name="infrastructure_rating" min="1" max="5" required><br><br>

    Suggestions:
    <textarea name="suggestion" required></textarea><br><br>

    <button type="submit">Submit Feedback</button>

</form>

</body>
</html>
